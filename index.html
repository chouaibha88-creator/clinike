<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سمائل | عيادة سما للأسنان - حجز مواعيد فاخر</title>
    <!-- Google Fonts + Font Awesome + AOS + Swiper -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1c;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D Animated Background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        .glass-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 1200px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 80px;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A5F0FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            margin-right: 2rem;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #64ffda; }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 7rem 1.5rem 4rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero + Form Ultra Premium */
        .booking-card {
            background: rgba(20, 28, 40, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 64px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            flex-wrap: wrap;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(100,255,218,0.3);
        }

        .left-hero {
            flex: 1.2;
            background: linear-gradient(145deg, #0B1320, #050a12);
            padding: 3rem;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .left-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(100,255,218,0.05) 0%, transparent 70%);
        }
        .clinic-name {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF, #64ffda);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .rating {
            display: flex;
            gap: 5px;
            margin: 1rem 0;
            color: #ffd966;
        }
        .features {
            list-style: none;
            margin-top: 2rem;
        }
        .features li {
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .right-form {
            flex: 1;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
        }
        .right-form h2 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #ccddee;
        }
        input, select, .phone-wrapper {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: white;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #64ffda;
            box-shadow: 0 0 12px rgba(100,255,218,0.3);
        }
        .datetime-row {
            display: flex;
            gap: 1rem;
        }
        .datetime-row .input-group {
            flex: 1;
        }
        .phone-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 0.1rem 0 0.8rem;
        }
        .country-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 0.4rem 0.8rem;
            border-radius: 60px;
            cursor: pointer;
            position: relative;
        }
        .country-dropdown {
            position: absolute;
            top: 55px;
            left: 0;
            background: #1e2a3a;
            border-radius: 24px;
            width: 260px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 200;
            display: none;
        }
        .phone-number-input {
            flex: 1;
            border: none !important;
            background: transparent;
            color: white;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(95deg, #64ffda, #00b4d8);
            border: none;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 800;
            color: #0a0f1c;
            border-radius: 60px;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            color: #64ffda;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #64ffda;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.4);
            position: relative;
            z-index: 10;
        }
        @media (max-width: 860px) {
            .booking-card { flex-direction: column; margin: 1rem; }
            .glass-nav { width: 90%; padding: 0.5rem 1rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="glass-nav">
    <div class="logo">SMA DENTAL</div>
    <div class="nav-links">
        <a href="#">الرئيسية</a>
        <a href="#">خدماتنا</a>
        <a href="#">اتصل بنا</a>
    </div>
</div>

<div class="container">
    <div class="booking-card" data-aos="fade-up" data-aos-duration="1000">
        <div class="left-hero">
            <div class="clinic-name">عيادة سما<br>للأسنان</div>
            <div class="rating">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                <span style="margin-right: 10px;">4.9 (1,200+ تقييم)</span>
            </div>
            <ul class="features">
                <li><i class="fas fa-microphone-alt"></i> حجز ذكي بالذكاء الاصطناعي</li>
                <li><i class="fas fa-clock"></i> تأكيد فوري 24/7</li>
                <li><i class="fas fa-shield-alt"></i> أحدث معايير التعقيم</li>
            </ul>
        </div>
        <div class="right-form">
            <h2>احجز موعدك الآن</h2>
            <p style="color:#a0c0e0;">املأ بياناتك واختر التوقيت المناسب</p>

            <div class="name-row" style="display: flex; gap: 1rem;">
                <div class="input-group" style="flex:1">
                    <label><i class="fas fa-user"></i> الاسم الأول</label>
                    <input type="text" id="firstName" placeholder="أحمد">
                </div>
                <div class="input-group" style="flex:1">
                    <label><i class="fas fa-user-friends"></i> اسم العائلة</label>
                    <input type="text" id="lastName" placeholder="محمد">
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
                <div class="phone-wrapper">
                    <div class="country-selector" id="countrySelector">
                        <span id="selectedFlag">🇩🇿</span>
                        <span id="selectedCode">+213</span>
                        <span><i class="fas fa-chevron-down"></i></span>
                        <div class="country-dropdown" id="countryDropdown"></div>
                    </div>
                    <input type="tel" id="phoneNumber" class="phone-number-input" placeholder="551234567">
                </div>
            </div>

            <!-- حقل اختيار التاريخ والوقت المفضل -->
            <div class="datetime-row">
                <div class="input-group">
                    <label><i class="fas fa-calendar-alt"></i> التاريخ المفضل</label>
                    <input type="date" id="preferredDate" min="2026-05-11">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-clock"></i> الوقت المفضل</label>
                    <select id="preferredTime">
                        <option value="">اختر الوقت</option>
                        <option value="09:00">09:00 صباحاً</option>
                        <option value="10:00">10:00 صباحاً</option>
                        <option value="11:00">11:00 صباحاً</option>
                        <option value="12:00">12:00 ظهراً</option>
                        <option value="14:00">02:00 مساءً</option>
                        <option value="15:00">03:00 مساءً</option>
                        <option value="16:00">04:00 مساءً</option>
                        <option value="17:00">05:00 مساءً</option>
                    </select>
                </div>
            </div>

            <button class="submit-btn" id="searchAppointmentBtn">
                <span class="btn-text"><i class="fas fa-sparkles"></i> بحث عن موعد</span>
                <span class="loading" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> جاري الإرسال</span>
            </button>
        </div>
    </div>
</div>
<footer>© 2026 سما للرعاية الذكية - حجز فاخر بالذكاء الاصطناعي</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // ---------- الدول ----------
    const countries = [
        { name: "الجزائر", flag: "🇩🇿", code: "+213" }, { name: "السعودية", flag: "🇸🇦", code: "+966" },
        { name: "مصر", flag: "🇪🇬", code: "+20" }, { name: "الإمارات", flag: "🇦🇪", code: "+971" },
        { name: "قطر", flag: "🇶🇦", code: "+974" }, { name: "الكويت", flag: "🇰🇼", code: "+965" },
        { name: "الولايات المتحدة", flag: "🇺🇸", code: "+1" }, { name: "بريطانيا", flag: "🇬🇧", code: "+44" },
        { name: "فرنسا", flag: "🇫🇷", code: "+33" }, { name: "ألمانيا", flag: "🇩🇪", code: "+49" }
    ];
    let selectedCountry = { flag: "🇩🇿", code: "+213", name: "الجزائر" };

    function buildDropdown() {
        const container = document.getElementById('countryDropdown');
        container.innerHTML = '';
        countries.forEach(ct => {
            const div = document.createElement('div');
            div.className = 'country-item';
            div.style.padding = '10px 15px';
            div.style.cursor = 'pointer';
            div.style.borderBottom = '1px solid #2a3a4a';
            div.innerHTML = `<span style="font-size:1.2rem;">${ct.flag}</span> <span style="margin:0 10px;">${ct.name}</span> <span style="color:#64ffda;">${ct.code}</span>`;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedCountry = ct;
                document.getElementById('selectedFlag').innerText = selectedCountry.flag;
                document.getElementById('selectedCode').innerText = selectedCountry.code;
                document.getElementById('countryDropdown').style.display = 'none';
            });
            container.appendChild(div);
        });
    }
    const sel = document.getElementById('countrySelector');
    const dropdownDiv = document.getElementById('countryDropdown');
    sel.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownDiv.style.display = dropdownDiv.style.display === 'block' ? 'none' : 'block';
    });
    document.addEventListener('click', () => dropdownDiv.style.display = 'none');
    buildDropdown();

    AOS.init({ once: true, duration: 800 });

    // ------ Webhook + Validation + إرسال مع الوقت ------
    const submitBtn = document.getElementById('searchAppointmentBtn');
    const btnSpan = document.querySelector('.btn-text');
    const loadingSpan = document.querySelector('.loading');
    const firstNameInp = document.getElementById('firstName');
    const lastNameInp = document.getElementById('lastName');
    const phoneInp = document.getElementById('phoneNumber');
    const dateInp = document.getElementById('preferredDate');
    const timeInp = document.getElementById('preferredTime');

    function showToast(msg, isError = false) {
        let toast = document.getElementById('toastMsgGlobal');
        if (!toast) {
            const div = document.createElement('div');
            div.id = 'toastMsgGlobal';
            div.className = 'toast-msg';
            document.body.appendChild(div);
            toast = div;
        }
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> <span>${msg}</span>`;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, 3500);
    }

    function validateForm() {
        if (!firstNameInp.value.trim()) { showToast("⚠️ الرجاء إدخال الاسم الأول", true); return false; }
        if (!lastNameInp.value.trim()) { showToast("⚠️ الرجاء إدخال اسم العائلة", true); return false; }
        if (!phoneInp.value.trim()) { showToast("⚠️ الرجاء إدخال رقم الهاتف", true); return false; }
        if (!dateInp.value) { showToast("⚠️ الرجاء اختيار التاريخ المفضل", true); return false; }
        if (!timeInp.value) { showToast("⚠️ الرجاء اختيار الوقت المفضل", true); return false; }
        return true;
    }

    async function sendToWebhook(payload) {
        const url = "https://choooouuuu.app.n8n.cloud/webhook-test/4fe15a31-6365-4b96-a3d5-3b02bbe3d31a";
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                showToast("✅ تم استلام طلبك! سنتصل بك لتأكيد الموعد قريباً.");
                firstNameInp.value = ''; lastNameInp.value = ''; phoneInp.value = '';
                dateInp.value = ''; timeInp.value = '';
            } else {
                showToast("❌ حدث خطأ، حاول مجدداً", true);
            }
        } catch (err) {
            showToast("❌ فشل الاتصال بالخادم", true);
        }
    }

    submitBtn.addEventListener('click', async () => {
        if (!validateForm()) return;
        const firstName = firstNameInp.value.trim();
        const lastName = lastNameInp.value.trim();
        const phoneRaw = phoneInp.value.trim();
        const fullPhone = selectedCountry.code + phoneRaw;
        const preferredDateTime = `${dateInp.value}T${timeInp.value}:00`;

        const payload = {
            first_name: firstName,
            last_name: lastName,
            full_phone: fullPhone,
            country_code: selectedCountry.code,
            preferred_datetime: preferredDateTime,
            preferred_date: dateInp.value,
            preferred_time: timeInp.value,
            source: "SmileDental_Ultra",
            timestamp: new Date().toISOString()
        };

        btnSpan.style.display = 'none';
        loadingSpan.style.display = 'flex';
        submitBtn.disabled = true;

        await sendToWebhook(payload);

        btnSpan.style.display = 'flex';
        loadingSpan.style.display = 'none';
        submitBtn.disabled = false;
    });

    // ------ 3D Background animation with particles ------
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    function initParticles() {
        particles = [];
        for (let i = 0; i < 90; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.5 + 0.2
            });
        }
    }
    function animateBg() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#0a0f1c";
        ctx.fillRect(0, 0, width, height);
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 255, 218, ${p.opacity})`;
            ctx.fill();
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x < 0) p.x = width;
            if (p.x > width) p.x = 0;
            if (p.y < 0) p.y = height;
            if (p.y > height) p.y = 0;
        });
        requestAnimationFrame(animateBg);
    }
    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
    });
    resizeCanvas();
    initParticles();
    animateBg();
</script>
</body>
</html>
